name: Add Google Ads tracking tag to all HTML pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-gtag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add gtag to HTML files
        run: |
          python3 << 'PYEOF'
          import os, glob

          GTAG = """    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18041772394"></script>
    <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'AW-18041772394');
    </script>"""

          count = 0
          for f in glob.glob("**/*.html", recursive=True):
              with open(f, "r", encoding="utf-8", errors="ignore") as fh:
                  content = fh.read()
              if "AW-18041772394" in content:
                  print(f"Skipped (already has tag): {f}")
                  continue
              if "<head>" in content:
                  content = content.replace("<head>", "<head>\n" + GTAG, 1)
                  with open(f, "w", encoding="utf-8") as fh:
                      fh.write(content)
                  count += 1
                  print(f"Updated: {f}")
              elif "<HEAD>" in content:
                  content = content.replace("<HEAD>", "<HEAD>\n" + GTAG, 1)
                  with open(f, "w", encoding="utf-8") as fh:
                      fh.write(content)
                  count += 1
                  print(f"Updated: {f}")
              else:
                  print(f"Skipped (no head tag): {f}")
          print(f"\nTotal files updated: {count}")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "Williamsdg"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Add Google Ads gtag.js to all HTML pages"
          git push
