<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Preview Portal | First Round Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0606;
            --gold: #f7b72e;
            --gold-light: #fcc955;
            --white: #ffffff;
            --text-secondary: #a09890;
            --gradient-gold: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .portal-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(247, 183, 46, 0.06) 0%, transparent 60%);
            z-index: 0;
        }

        .portal-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(247, 183, 46, 0.02) 1px, transparent 1px),
                linear-gradient(rgba(247, 183, 46, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .portal-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .portal-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .portal-company {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .portal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .portal-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .portal-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .portal-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            background: rgba(247, 183, 46, 0.04);
            border: 1px solid rgba(247, 183, 46, 0.12);
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all 0.3s ease;
        }

        .portal-link:hover {
            background: rgba(247, 183, 46, 0.1);
            border-color: rgba(247, 183, 46, 0.3);
            transform: translateY(-2px);
        }

        .portal-link svg {
            stroke: var(--gold);
            transition: transform 0.3s ease;
        }

        .portal-link:hover svg {
            transform: translateX(4px);
        }

        .portal-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold);
            padding: 0.35rem 0.75rem;
            background: rgba(247, 183, 46, 0.1);
            border-radius: 100px;
            margin-left: 0.5rem;
        }

        .portal-footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .portal-footer a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="portal-bg"></div>
    <div class="portal-grid"></div>

    <div class="portal-container">
        <div class="portal-logo">FRM</div>
        <div class="portal-company">First Round Management</div>

        <h1 class="portal-title">Website Preview Portal</h1>
        <p class="portal-desc">Welcome to the First Round Management website preview. Select a link below to view the latest designs.</p>

        <div class="portal-links">
            <a href="index.html" class="portal-link">
                <span>View Website Preview <span class="portal-badge">Latest</span></span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>

        <div class="portal-footer">
            <p>Prepared by <a href="https://williamsdigital.io" target="_blank">Williams Digital</a></p>
        </div>
    </div>
</body>
</html>
