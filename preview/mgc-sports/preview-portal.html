<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Portal Preview | MGC Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #a1a1aa;
            font-size: 0.875rem;
        }

        .preview-frame {
            width: 100%;
            max-width: 1400px;
            background: #12121a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 100px rgba(0, 0, 0, 0.5);
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .preview-dots {
            display: flex;
            gap: 0.5rem;
        }

        .preview-dots span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .preview-url {
            flex: 1;
            text-align: center;
            font-family: monospace;
            font-size: 0.75rem;
            color: #a1a1aa;
        }

        .preview-iframe {
            width: 100%;
            height: calc(100vh - 200px);
            min-height: 600px;
            border: none;
        }

        .back-link {
            margin-top: 2rem;
            color: #06b6d4;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Player Portal Preview</h1>
        <p>Secure dashboard for athlete representation management</p>
    </div>

    <div class="preview-frame">
        <div class="preview-header">
            <div class="preview-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="preview-url">portal.mgcsports.com</span>
        </div>
        <iframe src="portal.html" class="preview-iframe" title="MGC Sports Portal Preview"></iframe>
    </div>

    <a href="proposal-wd.html" class="back-link">← Back to Proposal</a>
</body>
</html>
