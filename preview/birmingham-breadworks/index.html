<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birmingham Breadworks</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0b08;
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===================== LOADER ===================== */
        #loader {
            position: fixed;
            inset: 0;
            background: #0c0b08;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1.1s ease;
        }

        #loader.out {
            opacity: 0;
            pointer-events: none;
        }

        /* --- Logo / Wordmark --- */
        .logo {
            text-align: center;
            margin-bottom: 58px;
            opacity: 0;
            animation: riseIn 0.9s ease 0.2s forwards;
        }

        .logo-name {
            font-size: 2.6rem;
            font-weight: 400;
            letter-spacing: 0.24em;
            background: linear-gradient(160deg, #f0c84a 0%, #d4961e 40%, #f5d060 70%, #c8820a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .logo-rule {
            width: 52px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4a830, transparent);
            margin: 13px auto;
        }

        .logo-sub {
            font-size: 0.63rem;
            letter-spacing: 0.48em;
            color: #c8a040;
            text-transform: uppercase;
        }

        /* --- Bread Row --- */
        .bread-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 52px;
            margin-bottom: 56px;
        }

        .bread-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
        }

        .bread-item:nth-child(1) {
            animation: popIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.85s forwards;
        }
        .bread-item:nth-child(2) {
            animation: popIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 1.15s forwards;
        }
        .bread-item:nth-child(3) {
            animation: popIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 1.45s forwards;
        }

        .bread-label {
            font-size: 0.58rem;
            letter-spacing: 0.36em;
            color: #b8902a;
            text-transform: uppercase;
        }

        /* --- Steam --- */
        .steam {
            display: flex;
            justify-content: center;
            gap: 5px;
            height: 26px;
            margin-bottom: -6px;
        }

        .steam span {
            display: block;
            width: 2px;
            border-radius: 2px;
            background: linear-gradient(to top, rgba(200, 168, 106, 0.55), transparent);
            animation: steamRise 2s ease-in-out infinite;
        }

        .steam span:nth-child(1) { height: 14px; animation-delay: 0s; }
        .steam span:nth-child(2) { height: 20px; animation-delay: 0.38s; }
        .steam span:nth-child(3) { height: 13px; animation-delay: 0.74s; }

        /* --- Progress --- */
        .progress-track {
            width: 190px;
            height: 1px;
            background: #1e1c14;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease 2.1s forwards;
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #a07020, #e0c068);
            animation: fillUp 2.4s ease 2.4s forwards;
        }

        .progress-sub {
            font-size: 0.58rem;
            letter-spacing: 0.42em;
            color: #a07e28;
            text-transform: uppercase;
            margin-top: 14px;
            opacity: 0;
            animation: fadeIn 0.8s ease 2.4s forwards;
        }

        /* ===================== KEYFRAMES ===================== */
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(22px) scale(0.82); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-9px); }
        }

        @keyframes steamRise {
            0%   { transform: translateY(0) scaleX(1);   opacity: 0.55; }
            100% { transform: translateY(-22px) scaleX(0.3); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes fillUp {
            0%   { width: 0%; }
            35%  { width: 42%; }
            72%  { width: 78%; }
            100% { width: 100%; }
        }

        /* ===================== SITE ===================== */
        #site {
            display: none;
            min-height: 100vh;
            background: #0c0b08;
            color: #f2ece0;
        }
    </style>
</head>
<body>

<div id="loader">

    <!-- ── Wordmark ── -->
    <div class="logo">
        <div class="logo-name">Birmingham<br>Breadworks</div>
        <div class="logo-rule"></div>
        <div class="logo-sub">Finely crafted bread</div>
    </div>

    <!-- ── Three Breads ── -->
    <div class="bread-row">

        <!-- ① Sourdough Boule -->
        <div class="bread-item" id="b1">
            <div class="steam"><span></span><span></span><span></span></div>

                <!-- drop shadow -->
                <ellipse cx="46" cy="76" rx="36" ry="5.5" fill="#000" opacity="0.28"/>
                <!-- outer crust ring -->
                <ellipse cx="46" cy="44" rx="39" ry="29" fill="#6a3e10"/>
                <!-- main crust -->
                <ellipse cx="46" cy="42" rx="37" ry="27" fill="#b87428"/>
                <!-- upper dome -->
                <ellipse cx="46" cy="40" rx="35" ry="25" fill="#ce9038"/>
                <!-- warm highlight -->
                <ellipse cx="38" cy="30" rx="14" ry="8" fill="#e8b858" opacity="0.40" transform="rotate(-18 38 30)"/>
                <!-- Score: center vertical slit -->
                <path d="M46 19 C47.2 27 47.2 33 46 41 C44.8 33 44.8 27 46 19Z" fill="#4a2808" opacity="0.8"/>
                <!-- Score: left horizontal arm -->
                <path d="M27 34 C33 34 39 37 45 40" stroke="#4a2808" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
                <!-- Score: right horizontal arm -->
                <path d="M65 34 C59 34 53 37 47 40" stroke="#4a2808" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
                <!-- Score: upper-left diagonal -->
                <path d="M31 24 C36 29 40 33 44 38" stroke="#4a2808" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.50"/>
                <!-- Score: upper-right diagonal -->
                <path d="M61 24 C56 29 52 33 48 38" stroke="#4a2808" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.50"/>
            </svg>
            <div class="bread-label">Sourdough</div>
        </div>

        <!-- ② Croissant -->
        <div class="bread-item" id="b2">
            <svg width="118" height="72" viewBox="0 0 118 72" xmlns="http://www.w3.org/2000/svg">
                <!-- shadow -->
                <ellipse cx="59" cy="65" rx="48" ry="6" fill="#000" opacity="0.22"/>
                <!-- outer dark body -->
                <path d="M13 54 Q8 37 17 23 Q25 11 38 17 Q45 21 47 31 Q51 20 62 15 Q74 10 85 18 Q99 27 101 42 Q103 53 94 59 Q84 65 72 58 Q62 52 59 39 Q56 52 45 58 Q30 65 13 54Z" fill="#7a4c14"/>
                <!-- main body -->
                <path d="M15 52 Q11 36 19 23 Q27 12 39 18 Q46 22 47 32 Q51 21 62 16 Q73 12 84 19 Q97 28 99 42 Q100 52 92 57 Q83 62 71 56 Q62 50 59 38 Q56 50 45 56 Q31 63 15 52Z" fill="#c07e28"/>
                <!-- lighter face -->
                <path d="M18 50 Q14 35 22 23 Q29 14 40 19 Q46 23 47 33 Q51 22 62 17 Q72 14 83 20 Q94 29 96 42 Q97 50 90 55 Q81 60 70 54 Q62 48 59 37 Q56 48 45 54 Q32 61 18 50Z" fill="#d89038"/>
                <!-- highlight left horn -->
                <ellipse cx="34" cy="27" rx="11" ry="5.5" fill="#e8ba58" opacity="0.38" transform="rotate(-42 34 27)"/>
                <!-- highlight right horn -->
                <ellipse cx="80" cy="27" rx="11" ry="5.5" fill="#e8ba58" opacity="0.32" transform="rotate(42 80 27)"/>
                <!-- Left horn layer lines -->
                <path d="M21 36 Q32 29 42 33" stroke="#dfa040" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.62"/>
                <path d="M22 41 Q33 34 43 38" stroke="#dfa040" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.52"/>
                <path d="M23 46 Q34 39 43 43" stroke="#dfa040" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.40"/>
                <!-- Right horn layer lines -->
                <path d="M76 33 Q86 28 96 35" stroke="#dfa040" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.62"/>
                <path d="M75 38 Q85 33 95 40" stroke="#dfa040" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.52"/>
                <path d="M74 43 Q84 38 93 45" stroke="#dfa040" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.40"/>
                <!-- center fold crease -->
                <path d="M52 32 Q56 36 59 38 Q62 36 66 32" stroke="#b07018" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.48"/>
            </svg>
            <div class="bread-label">Croissant</div>
        </div>

        <!-- ③ Baguette -->
        <div class="bread-item" id="b3">
            <svg width="58" height="132" viewBox="0 0 58 132" xmlns="http://www.w3.org/2000/svg">
                <!-- shadow -->
                <ellipse cx="29" cy="126" rx="18" ry="5" fill="#000" opacity="0.24"/>
                <!-- outer crust -->
                <path d="M20 11 Q9 16 7 30 L5 94 Q4 110 14 121 Q21 128 29 126 Q37 124 43 116 Q50 105 48 90 L46 30 Q43 15 36 11 Q30 7 20 11Z" fill="#6a3e10"/>
                <!-- main body -->
                <path d="M22 9 Q11 14 9 28 L7 92 Q6 108 16 119 Q22 126 29 124 Q36 122 42 114 Q49 103 47 89 L45 29 Q42 13 35 9 Q29 6 22 9Z" fill="#b87428"/>
                <!-- upper face -->
                <path d="M24 8 Q14 12 11 27 L9 91 Q9 106 18 117 Q24 124 29 122 Q35 120 41 112 Q47 102 45 88 L43 28 Q40 12 33 8 Q28 5 24 8Z" fill="#ce9038"/>
                <!-- highlight strip -->
                <path d="M22 16 Q20 46 21 84" stroke="#e8b858" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.19"/>
                <!-- Score marks – left column -->
                <path d="M11 38 Q21 33 29 38" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M11 52 Q21 47 29 52" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M11 66 Q21 61 29 66" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M11 80 Q21 75 29 80" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M11 94 Q21 89 29 94" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.72"/>
                <!-- Score marks – right column -->
                <path d="M29 38 Q38 33 47 38" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M29 52 Q38 47 47 52" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M29 66 Q38 61 47 66" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M29 80 Q38 75 47 80" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.80"/>
                <path d="M29 94 Q38 89 47 94" stroke="#4a2808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.72"/>
            </svg>
            <div class="bread-label">Baguette</div>
        </div>

    </div>

    <!-- ── Progress ── -->
    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>
    <div class="progress-sub">Birmingham's choice for finely crafted bread</div>

</div>

<!-- ── Main site content (revealed after loader) ── -->
<div id="site">
    <!-- Your full site goes here -->
</div>

<script>
    const floatConfig = [
        { duration: 2.7,  delay: 0    },
        { duration: 3.05, delay: 0.42 },
        { duration: 2.85, delay: 0.85 }
    ];

    function startLoader() {
        const loader = document.getElementById('loader');

        // Reset loader visibility
        loader.style.display = 'flex';
        loader.style.opacity  = '1';
        loader.classList.remove('out');

        // Reset animated elements so CSS animations replay
        const logo      = loader.querySelector('.logo');
        const items     = [1,2,3].map(n => document.getElementById(`b${n}`));
        const track     = loader.querySelector('.progress-track');
        const fill      = loader.querySelector('.progress-fill');
        const sub       = loader.querySelector('.progress-sub');

        [logo, ...items, track, sub].forEach(el => {
            el.style.animation = 'none';
            el.style.opacity   = '0';
            void el.offsetWidth; // force reflow
        });
        fill.style.animation = 'none';
        fill.style.width     = '0';
        void fill.offsetWidth;

        // Re-apply CSS animations
        logo.style.animation  = 'riseIn 0.9s ease 0.2s forwards';
        items[0].style.animation = 'popIn 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.85s forwards';
        items[1].style.animation = 'popIn 0.65s cubic-bezier(0.34,1.56,0.64,1) 1.15s forwards';
        items[2].style.animation = 'popIn 0.65s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards';
        track.style.animation = 'fadeIn 0.5s ease 2.1s forwards';
        fill.style.animation  = 'fillUp 2.4s ease 2.4s forwards';
        sub.style.animation   = 'fadeIn 0.8s ease 2.4s forwards';

        // Switch each bread to floating after its pop-in completes
        items.forEach((el, i) => {
            setTimeout(() => {
                el.style.opacity   = '1';
                el.style.animation = `float ${floatConfig[i].duration}s ease-in-out ${floatConfig[i].delay}s infinite`;
            }, (0.85 + i * 0.3 + 0.65) * 1000);
        });

        // Fade out, then loop
        setTimeout(() => {
            loader.classList.add('out');
            setTimeout(startLoader, 1100);
        }, 4800);
    }

    startLoader();
</script>

</body>
</html>
